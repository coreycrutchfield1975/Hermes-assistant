<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Hermes — KITT Voice Agent</title>
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--r:#ff1a1a;--r2:#cc0000;--g:#ff3333;--d:#050508;--d2:#0a0a0f;--panel:#0d0d15}
html,body{width:100%;height:100%;overflow:hidden;background:var(--d);font-family:'Inter',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

/* Background */
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at bottom,#0a0a0f 0%,#030306 100%);pointer-events:none}

/* Grid overlay */
#grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,26,26,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,26,26,0.03) 1px,transparent 1px);background-size:30px 30px}

/* Dashboard panel */
#dash{position:fixed;bottom:0;left:0;right:0;height:30%;z-index:3;pointer-events:none}
#dash::before{content:'';position:absolute;bottom:0;left:0;right:0;height:100%;background:linear-gradient(180deg,transparent 0%,rgba(5,5,8,0.95) 30%,rgba(3,3,6,1) 100%);border-top:1px solid rgba(255,26,26,0.05)}
#dash::after{content:'';position:absolute;top:0;left:5%;right:5%;height:0.5px;background:linear-gradient(90deg,transparent,rgba(255,26,26,0.08),transparent)}

/* ── KITT Scanner bar ── */
#scan{position:fixed;top:50%;left:0;right:0;height:3px;z-index:5;transform:translateY(-50%);pointer-events:none}
#scan .track{position:absolute;inset:0;background:rgba(255,26,26,0.05)}
#scan .led{position:absolute;width:100px;height:3px;background:var(--r);box-shadow:0 0 25px rgba(255,26,26,0.9),0 0 60px rgba(255,26,26,0.4),0 0 120px rgba(255,26,26,0.2);animation:scan 2.8s ease-in-out infinite;border-radius:1.5px}
#scan .led2{position:absolute;width:50px;height:2px;background:rgba(255,26,26,0.35);box-shadow:0 0 12px rgba(255,26,26,0.25);animation:scan2 2.8s ease-in-out infinite 0.4s;border-radius:1px}
@keyframes scan{0%{left:-100px}50%{left:calc(100% - 100px)}100%{left:-100px}}
@keyframes scan2{0%{left:-50px}50%{left:calc(100% - 50px)}100%{left:-50px}}

/* ── Vertical Equalizer (KITT voice inside car) ── */
#eq{position:fixed;bottom:clamp(120px,18vh,160px);left:50%;transform:translateX(-50%);z-index:4;display:flex;align-items:flex-end;justify-content:center;gap:4px;height:clamp(80px,12vh,120px);width:clamp(200px,60vw,360px);pointer-events:none;opacity:1;transition:opacity 0.5s}
#eq.idle{opacity:0.15}
#eq.thinking{opacity:0.5}
#eq.processing{opacity:1}
.eq-bar{width:clamp(8px,2vw,14px);background:linear-gradient(180deg,var(--r),var(--r2));border-radius:3px 3px 0 0;min-height:4px;transition:height 0.1s ease;box-shadow:0 0 8px rgba(255,26,26,0.3)}

/* ── Status ── */
#status{position:fixed;top:clamp(14px,2.5vh,22px);left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;font-size:clamp(0.4rem,1vw,0.5rem);letter-spacing:5px;color:rgba(255,26,26,0.3);text-transform:uppercase;font-weight:400;transition:all 0.4s;white-space:nowrap;background:rgba(5,5,8,0.6);padding:4px 14px;border-radius:10px;border:1px solid rgba(255,26,26,0.06);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#status.listening{color:var(--r);text-shadow:0 0 20px rgba(255,26,26,0.3);border-color:rgba(255,26,26,0.15)}
#status.wake{color:#ff6666;text-shadow:0 0 25px rgba(255,26,26,0.5);border-color:rgba(255,26,26,0.25)}
#status.processing{color:#ff4444;text-shadow:0 0 20px rgba(255,26,26,0.4);border-color:rgba(255,26,26,0.2)}
#status.error{color:#ff4444;border-color:rgba(255,26,26,0.2)}

/* ── Hero title ── */
#hero{position:fixed;top:clamp(60px,10vh,90px);left:50%;transform:translateX(-50%);z-index:5;text-align:center;pointer-events:none}
#hero .big{font-size:clamp(2.2rem,10vw,4.2rem);font-weight:900;letter-spacing:5px;background:linear-gradient(180deg,#ff1a1a,#990000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none}
#hero .sub{font-size:clamp(0.4rem,1.1vw,0.55rem);letter-spacing:5px;color:rgba(255,26,26,0.2);margin-top:6px;text-transform:uppercase}

/* ── Transcript / response ── */
#transcript{position:fixed;bottom:clamp(50px,8vh,75px);left:10%;right:10%;z-index:5;font-size:clamp(0.7rem,2.2vw,1rem);color:rgba(255,255,255,0.5);text-align:center;font-weight:300;letter-spacing:0.3px;pointer-events:none;line-height:1.5;min-height:clamp(40px,6vh,55px);display:flex;align-items:center;justify-content:center}
#transcript .response{color:rgba(255,255,255,0.7)}

/* ── Mic button ── */
#mic{position:fixed;bottom:clamp(20px,3.5vh,35px);left:50%;transform:translateX(-50%);z-index:10;width:clamp(54px,9vw,68px);height:clamp(54px,9vw,68px);border-radius:50%;border:2px solid rgba(255,26,26,0.2);background:rgba(255,26,26,0.05);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;color:rgba(255,26,26,0.4);font-size:clamp(22px,4vw,28px)}
#mic:active{transform:translateX(-50%) scale(0.88)}
#mic.active{animation:micPulse 1.8s ease-in-out infinite;border-color:var(--r);background:rgba(255,26,26,0.1);color:var(--r)}
@keyframes micPulse{0%,100%{box-shadow:0 0 15px rgba(255,26,26,0.1);transform:translateX(-50%) scale(1)}50%{box-shadow:0 0 35px rgba(255,26,26,0.25);transform:translateX(-50%) scale(1.06)}}

/* ── Footer / Telegram link ── */
#ft{position:fixed;bottom:clamp(6px,1vh,10px);left:0;right:0;text-align:center;z-index:10;font-size:clamp(0.3rem,0.8vw,0.4rem);color:rgba(255,26,26,0.1);letter-spacing:4px;text-transform:uppercase;pointer-events:none}
#ft a{color:rgba(255,26,26,0.15);text-decoration:none;pointer-events:auto;transition:color 0.3s}
#ft a:active{color:rgba(255,26,26,0.4)}

/* ── Ambient mode ── */
body.ambient #hero .big{opacity:0.1;transition:opacity 2s}
body.ambient #scan .led{animation-duration:5s;opacity:0.3}
body.ambient #mic{opacity:0.15;transform:translateX(-50%) scale(0.7);pointer-events:none;transition:all 2s}
body.ambient #status{opacity:0.2;transition:opacity 2s}
body.ambient #eq{opacity:0.2;transition:opacity 2s}
body.ambient #transcript{opacity:0.1;transition:opacity 2s}

/* ── Listening mode overrides ── */
body.listening-active #scan .led{animation-duration:1.2s;box-shadow:0 0 35px rgba(255,26,26,1),0 0 80px rgba(255,26,26,0.5),0 0 150px rgba(255,26,26,0.2)}
body.listening-active #eq{opacity:1!important}
</style>
</head>
<body>

<div id="bg"></div>
<div id="grid"></div>
<div id="dash"></div>

<div id="hero">
  <div class="big">HERMES</div>
  <div class="sub">Voice  •  Agent  •  KITT</div>
</div>

<div id="status">■ STANDBY</div>

<div id="scan"><div class="track"></div><div class="led"></div><div class="led2"></div></div>

<div id="eq"></div>

<div id="transcript"><span class="ph">Say "Hey Hermes" or tap the mic</span></div>

<button id="mic" aria-label="Microphone">🎤</button>

<div id="ft"><a href="tg://resolve?domain=Coreysflybot" target="_blank" rel="noopener">⟐ CONNECT TO HERMES</a></div>

<script>
(function(){
'use strict';

// ── DOM refs ──
var statusEl=document.getElementById('status');
var micBtn=document.getElementById('mic');
var transcriptEl=document.getElementById('transcript');
var eqEl=document.getElementById('eq');
var scanEl=document.getElementById('scan');

// ── Equalizer bars ──
var EQ_COUNT=21;
var eqBars=[];
(function(){
  for(var i=0;i<EQ_COUNT;i++){
    var bar=document.createElement('div');
    bar.className='eq-bar';
    bar.style.height='4px';
    eqEl.appendChild(bar);
    eqBars.push(bar);
  }
  eqEl.classList.add('idle');
})();

// ── Equalizer animation ──
var eqAnimating=false;
var eqPhase=0;
function animateEq(intensity){
  if(!eqAnimating){eqAnimating=true;eqLoop();}
  eqEl.className=intensity;
}
function eqLoop(){
  eqPhase+=0.05;
  var active=eqEl.className;
  var base;
  if(active==='processing')base=0.7;
  else if(active==='thinking')base=0.35;
  else base=0.08;
  var t=eqPhase;
  for(var i=0;i<EQ_COUNT;i++){
    var val=base*(1+0.8*Math.sin(t+i*0.5+Math.sin(t*0.7+i*0.3)*0.5));
    var px=Math.max(4,Math.min(120,val*clampHeight()));
    eqBars[i].style.height=px+'px';
  }
  requestAnimationFrame(eqLoop);
}
function clampHeight(){
  var rect=eqEl.getBoundingClientRect();
  return rect.height||80;
}

// ── Status ──
function setStatus(state,msg){
  statusEl.className=state;
  statusEl.textContent='\u25a0 '+(state==='listening'?'LISTENING':state==='wake'?'AWAKE':state==='processing'?'PROCESSING':state==='error'?'ERROR':'STANDBY');
  document.body.classList.toggle('listening-active',state==='wake'||state==='processing');
  if(state==='processing'||state==='wake'){animateEq('processing')}
  else if(state==='listening'){animateEq('idle')}
  else if(state==='error'){animateEq('idle')}
  else{animateEq('idle')}
}

// ── Transcript helpers ──
function showTranscript(text,isResponse){
  if(text){
    transcriptEl.innerHTML=isResponse?'<span class="response">'+esc(text)+'</span>':'<span>'+esc(text)+'</span>';
  }else{
    transcriptEl.innerHTML='<span class="ph">Say "Hey Hermes" or tap the mic</span>';
  }
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── TTS ──
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.rate=1.0;u.pitch=0.85;u.lang='en-US';
  var voices=window.speechSynthesis.getVoices();
  var pref=voices.find(function(v){return v.lang.startsWith('en')&&(v.name.includes('Google UK')||v.name.includes('Female'))})||voices.find(function(v){return v.lang.startsWith('en')});
  if(pref)u.voice=pref;
  window.speechSynthesis.speak(u);
}

// ── API call ──
function callHermes(cmd){
  showTranscript(cmd);
  setStatus('processing','');
  animateEq('processing');
  fetch('/api/hermes',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({command:cmd})
  })
  .then(function(r){return r.json()})
  .then(function(d){
    showTranscript(d.response,true);
    speak(d.response);
    if(d.action==='open'&&d.url){
      setTimeout(function(){window.open(d.url,'_blank')},600);
    }
    if(d.visualization==='thinking'){animateEq('thinking')}
    else{animateEq('idle')}
    setTimeout(function(){setStatus('listening','')},4000);
  })
  .catch(function(){
    showTranscript('Connection error. Try again.',true);
    speak('Connection error. Try again.');
    setStatus('listening','');
  });
}

// ── Speech recognition ──
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var recognition=null,isListening=false,restartTimer=null,wakeActive=false,commandTimeout=null,ambientMode=false;

function startRecognition(){
  if(!SR){setStatus('error','');return}
  if(recognition){try{recognition.abort()}catch(e){}}
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-US';
  recognition.maxAlternatives=3;

  var silenceTimer=null;

  recognition.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal)final+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    if(final)showTranscript(final);
    else if(interim)showTranscript(interim);

    if(final&&final.trim()){
      var cmd=final.toLowerCase().trim();
      
      if(cmd.includes('hey hermes')||cmd.includes('hermes')){
        wakeActive=true;
        setStatus('wake','');
        micBtn.classList.add('active');
        animateEq('processing');
        speak('Yes?');
        var afterWake=cmd.replace(/^(hey\s+)?hermes[,]?\s*/,'').trim();
        if(afterWake&&afterWake!='hermes'&&!afterWake.includes('hey hermes')){
          wakeActive=false;
          setTimeout(function(){callHermes(afterWake)},400);
          return;
        }
        if(silenceTimer)clearTimeout(silenceTimer);
        silenceTimer=setTimeout(function(){wakeActive=false;setStatus('listening','');micBtn.classList.remove('active');animateEq('idle')},8000);
        return;
      }

      if(wakeActive){
        wakeActive=false;
        setTimeout(function(){callHermes(final.trim())},200);
        if(silenceTimer)clearTimeout(silenceTimer);
        return;
      }

      // Direct command (no wake word needed)
      var dc=['hello','hey','hi','help','search','weather','open','time','date','thank','thanks','who are you','what can you','good morning','good evening','bye','joke','how are you'];
      var isDirect=false;
      for(var i=0;i<dc.length;i++){if(cmd.includes(dc[i])){isDirect=true;break}}
      if(isDirect){
        setTimeout(function(){callHermes(final.trim())},200);
        if(silenceTimer)clearTimeout(silenceTimer);
      }
    }
  };

  recognition.onerror=function(e){
    if(e.error==='not-allowed'){setStatus('error','');return}
    if(e.error!=='no-speech')scheduleRestart();
  };
  recognition.onend=function(){scheduleRestart()};

  try{
    recognition.start();
    isListening=true;
    setStatus('listening','');
    micBtn.classList.add('active');
  }catch(e){scheduleRestart()}
}

function scheduleRestart(){
  if(restartTimer)clearTimeout(restartTimer);
  restartTimer=setTimeout(function(){if(!isListening)startRecognition()},1000);
}
function stopRecognition(){
  if(restartTimer)clearTimeout(restartTimer);
  if(recognition){try{recognition.stop()}catch(e){}recognition=null}
  isListening=false;micBtn.classList.remove('active');animateEq('idle');
}

// ── Event listeners ──
micBtn.addEventListener('click',function(){
  if(isListening){stopRecognition();setStatus('listening','');micBtn.classList.remove('active')}
  else{startRecognition()}
});

// Ambient mode: triple-tap or long-press
var tapCount=0,tapTimer=null;
document.addEventListener('click',function(e){
  if(e.target.closest('#mic')||e.target.closest('#ft a'))return;
  tapCount++;
  if(tapCount===1){tapTimer=setTimeout(function(){tapCount=0},500)}
  else if(tapCount>=3){
    clearTimeout(tapTimer);tapCount=0;
    ambientMode=!ambientMode;
    document.body.classList.toggle('ambient',ambientMode);
  }
});

// ── Init ──
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()};
}
setTimeout(function(){try{startRecognition()}catch(e){setStatus('error','')}},600);
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

})();
</script>
</body>
</html>
